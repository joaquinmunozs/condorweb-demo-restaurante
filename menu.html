<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Carta · La Causa de Don Lucho</title>
  <meta name="description" content="Carta digital de La Causa de Don Lucho — comida criolla peruana en Barranco, Lima." />
  <meta name="theme-color" content="#0d0b0a" />

  <!-- Favicon e íconos con el logo -->
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />

  <!-- Open Graph (vista previa al compartir) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Carta · La Causa de Don Lucho" />
  <meta property="og:description" content="Nuestra carta criolla en Barranco, Lima. Mira cada plato en video." />
  <meta property="og:image" content="https://joaquinmunozs.github.io/condorweb-demo-restaurante/assets/logo.png" />

  <!-- ===== Fuentes: Playfair Display (títulos) + Lato (cuerpo) ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=Manrope:wght@300;400;500;700;800&display=swap" rel="stylesheet" />

  <style>
    /* =========================================================
       VARIABLES — identidad criolla premium
       ========================================================= */
    :root {
      --dorado: #c8a96e;
      --dorado-claro: #e7d3a6;
      --rojo: #8b1a1a;
      --crema: #fdf6e3;
      --negro: #120f0d;
      --wsp: #25d366;
      --wsp-oscuro: #1ebe57;
      --radio: 16px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: radial-gradient(70% 50% at 50% 0%, rgba(200,169,110,.12), transparent 60%), #0d0b0a;
      color: var(--crema); -webkit-font-smoothing: antialiased;
      padding-bottom: calc(86px + env(safe-area-inset-bottom));
      overflow-x: hidden;
    }
    h1, h2, h3 { font-family: 'Fraunces', serif; }
    a { text-decoration: none; color: inherit; }
    .contenedor { width: 100%; max-width: 920px; margin: 0 auto; padding: 0 16px; }

    /* =========================================================
       LOGO (marca reutilizable) — olla de barro humeante
       ========================================================= */
    .logo { display: inline-flex; align-items: center; gap: 10px; }
    .logo .logo-ico { width: 40px; height: 40px; object-fit: contain; flex: 0 0 auto; filter: drop-shadow(0 4px 10px rgba(0,0,0,.4)); }
    .logo .word { font-family: 'Fraunces', serif; font-weight: 800; font-size: 1.02rem; line-height: 1; letter-spacing: .3px; }
    .logo .word b { color: var(--dorado); font-weight: 800; }

    /* =========================================================
       TOPBAR sticky
       ========================================================= */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
      background: linear-gradient(to bottom, rgba(13,11,10,.97), rgba(13,11,10,.85));
      backdrop-filter: blur(10px); border-bottom: 1px solid rgba(200,169,110,.2);
    }
    .btn-volver {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .76rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
      border: 1px solid rgba(231,211,166,.45); color: var(--dorado-claro);
      padding: 8px 14px; border-radius: 999px; transition: all .2s ease;
    }
    .btn-volver:hover { background: var(--dorado); color: var(--negro); }

    /* =========================================================
       CABECERA DE LA CARTA con escudo (crest)
       ========================================================= */
    .carta-head { text-align: center; padding: 40px 16px 18px; }
    .carta-head .crest { width: 124px; height: auto; margin: 0 auto 14px; display: block; object-fit: contain; filter: drop-shadow(0 10px 24px rgba(0,0,0,.5)); animation: aparece .9s ease both; }
    @keyframes aparece { from { opacity: 0; transform: translateY(14px) scale(.92); } to { opacity: 1; transform: none; } }
    .carta-head h1 { font-size: clamp(2rem, 9vw, 2.9rem); font-weight: 900; }
    .carta-head h1 em { font-style: italic; color: var(--dorado-claro); }
    .carta-head p { color: rgba(253,246,227,.7); font-size: .82rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; }

    /* =========================================================
       FILTRO DE CATEGORÍAS (chips sticky)
       ========================================================= */
    .filtros-wrap {
      position: sticky; top: calc(57px + env(safe-area-inset-top)); z-index: 45;
      background: linear-gradient(to bottom, rgba(13,11,10,.98), rgba(13,11,10,.92));
      backdrop-filter: blur(8px); border-bottom: 1px solid rgba(200,169,110,.14);
      margin-bottom: 22px;
    }
    .filtros { display: flex; gap: 9px; overflow-x: auto; padding: 13px 16px; max-width: 920px; margin: 0 auto; scrollbar-width: none; }
    .filtros::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto; cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
      font-family: 'Manrope', sans-serif; font-weight: 700; font-size: .84rem; white-space: nowrap;
      padding: 9px 16px; border-radius: 999px; color: var(--dorado-claro);
      background: rgba(200,169,110,.08); border: 1px solid rgba(200,169,110,.35);
      transition: all .25s ease;
    }
    .chip .ico { font-size: 1rem; }
    .chip .n { font-size: .68rem; opacity: .7; font-weight: 700; }
    .chip:hover { border-color: var(--dorado); }
    .chip.activo { background: var(--dorado); color: var(--negro); border-color: var(--dorado); }
    .chip.activo .n { opacity: .75; }

    .conteo { text-align: center; font-size: .78rem; letter-spacing: 1px; text-transform: uppercase; color: rgba(253,246,227,.55); margin-bottom: 18px; }

    /* =========================================================
       GRID DE PLATOS — 2 COLUMNAS
       ========================================================= */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding-bottom: 30px; }
    @media (min-width: 760px) { .grid { gap: 22px; } }

    .plato {
      position: relative; border-radius: var(--radio); overflow: hidden;
      background: #1a1410; border: 1px solid rgba(200,169,110,.22);
      box-shadow: 0 18px 40px -24px rgba(0,0,0,.8);
      transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease, border-color .35s ease, opacity .4s ease;
      opacity: 0; transform: translateY(28px);
    }
    .plato.visible { opacity: 1; transform: translateY(0); }
    .plato:hover { transform: translateY(-6px); box-shadow: 0 36px 70px -28px rgba(0,0,0,.9); border-color: rgba(200,169,110,.55); }
    .plato.oculto { display: none; }

    /* ---------- ZONA MULTIMEDIA (video + escena 3D) ---------- */
    .media { position: relative; aspect-ratio: 3 / 4; overflow: hidden; }
    .plato-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; }

    /* ---------- ESCENA 3D CINEMATOGRÁFICA (fallback CSS) ---------- */
    .escena {
      position: absolute; inset: 0; z-index: 1; overflow: hidden; perspective: 800px;
      background:
        radial-gradient(85% 65% at 50% 22%, color-mix(in srgb, var(--tema) 72%, #2a1d12), transparent 60%),
        linear-gradient(170deg, color-mix(in srgb, var(--tema) 45%, #0d0b0a), #0b0a09 78%);
    }
    .escena::after { content: ""; position: absolute; top: -40%; left: -60%; width: 70%; height: 200%; transform: rotate(18deg); background: linear-gradient(90deg, transparent, rgba(255,255,255,.13), transparent); animation: barrido 7s ease-in-out infinite; }
    @keyframes barrido { 0% { left: -60%; } 55%, 100% { left: 140%; } }
    .platillo3d { position: absolute; top: 42%; left: 50%; transform: translate(-50%,-50%); transform-style: preserve-3d; width: 150px; height: 150px; display: grid; place-items: center; }
    .halo { position: absolute; width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, color-mix(in srgb, var(--tema) 85%, #fff), transparent 62%); filter: blur(7px); animation: respira 5s ease-in-out infinite; }
    @keyframes respira { 0%,100% { opacity: .45; transform: scale(.9); } 50% { opacity: .9; transform: scale(1.12); } }
    .anillo { position: absolute; width: 132px; height: 132px; border-radius: 50%; border: 2px solid rgba(231,211,166,.5); border-top-color: transparent; border-bottom-color: transparent; animation: girar 9s linear infinite; }
    .anillo.b { width: 158px; height: 158px; border-color: rgba(231,211,166,.22); border-left-color: transparent; border-right-color: transparent; animation-duration: 14s; animation-direction: reverse; }
    @keyframes girar { from { transform: rotateX(72deg) rotateZ(0); } to { transform: rotateX(72deg) rotateZ(360deg); } }
    .plato-emoji { position: relative; z-index: 3; font-size: 4.4rem; line-height: 1; filter: drop-shadow(0 18px 22px rgba(0,0,0,.55)); transform: translateZ(40px); animation: flota 6s ease-in-out infinite; }
    @keyframes flota { 0%,100% { transform: translateZ(40px) translateY(0) rotate3d(1,1,0,-8deg); } 50% { transform: translateZ(40px) translateY(-10px) rotate3d(1,1,0,8deg); } }
    .vapor { position: absolute; z-index: 2; top: 20%; left: 50%; transform: translateX(-50%); width: 100px; height: 120px; pointer-events: none; }
    .vapor span { position: absolute; bottom: 0; width: 12px; height: 48px; border-radius: 50%; background: linear-gradient(to top, rgba(255,255,255,.5), rgba(255,255,255,0)); filter: blur(6px); opacity: 0; animation: humo 4.4s ease-in infinite; }
    .vapor span:nth-child(1) { left: 18px; animation-delay: 0s; }
    .vapor span:nth-child(2) { left: 44px; animation-delay: 1.3s; width: 15px; }
    .vapor span:nth-child(3) { left: 70px; animation-delay: 2.6s; }
    @keyframes humo { 0% { transform: translateY(0) scaleX(1); opacity: 0; } 16% { opacity: .7; } 100% { transform: translateY(-100px) scaleX(2.4); opacity: 0; } }

    .scrim { position: absolute; inset: 0; z-index: 3; pointer-events: none; background: linear-gradient(to top, rgba(8,7,6,.92) 2%, rgba(8,7,6,.35) 28%, transparent 52%); }

    .live { position: absolute; top: 10px; right: 10px; z-index: 5; display: inline-flex; align-items: center; gap: 5px; font-size: .6rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #fff; background: rgba(0,0,0,.45); padding: 4px 9px; border-radius: 999px; backdrop-filter: blur(4px); }
    .live .dot { width: 6px; height: 6px; border-radius: 50%; background: #ff5a3c; animation: latido 1.4s ease-in-out infinite; }
    @keyframes latido { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(.7); } }

    .badge { position: absolute; top: 10px; left: 10px; z-index: 5; display: inline-flex; align-items: center; gap: 5px; font-size: .62rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--negro); background: var(--dorado); padding: 5px 10px; border-radius: 999px; box-shadow: 0 4px 12px rgba(0,0,0,.4); }

    .media .titulo { position: absolute; left: 12px; right: 12px; bottom: 12px; z-index: 4; }
    .media .cat { display: block; font-size: .6rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dorado-claro); margin-bottom: 4px; }
    .media h3 { font-size: clamp(1.1rem, 4.4vw, 1.4rem); font-weight: 800; line-height: 1.1; text-shadow: 0 2px 12px rgba(0,0,0,.7); }
    .media h3 em { font-style: italic; color: var(--dorado-claro); }

    .info { padding: 13px 14px 15px; }
    .info p { font-size: .82rem; font-weight: 300; color: rgba(253,246,227,.75); margin-bottom: 12px; min-height: 2.6em; }
    .info .fila { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .precio { font-family: 'Fraunces', serif; font-weight: 800; font-size: 1.3rem; color: var(--dorado-claro); }
    .pedir { display: inline-flex; align-items: center; gap: 6px; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; background: var(--wsp); color: #fff; padding: 8px 13px; border-radius: 999px; transition: background .2s ease, transform .2s ease; }
    .pedir:hover { background: var(--wsp-oscuro); transform: translateY(-2px); }
    .pedir svg { width: 15px; height: 15px; fill: #fff; }

    /* =========================================================
       BARRA FIJA INFERIOR — Reservar
       ========================================================= */
    .barra-reserva { position: fixed; bottom: 0; left: 0; right: 0; z-index: 60; padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); background: linear-gradient(0deg, #0d0b0a 72%, rgba(13,11,10,0)); }
    .barra-reserva a { display: flex; align-items: center; gap: 13px; width: 100%; max-width: 460px; margin: 0 auto; color: #fff; padding: 9px 22px 9px 9px; border-radius: 18px; background: linear-gradient(135deg, #0e8a6f 0%, #1ebe57 55%, #25d366 100%); border: 1px solid rgba(255,255,255,.18); box-shadow: 0 16px 40px -12px rgba(18,140,126,.7), inset 0 1px 0 rgba(255,255,255,.28); transition: transform .25s ease, box-shadow .25s ease; }
    .barra-reserva a:hover { transform: translateY(-2px); box-shadow: 0 24px 50px -14px rgba(18,140,126,.8), inset 0 1px 0 rgba(255,255,255,.28); }
    .barra-reserva .ic { width: 46px; height: 46px; flex: 0 0 auto; border-radius: 50%; background: rgba(255,255,255,.18); display: grid; place-items: center; }
    .barra-reserva .ic svg { width: 25px; height: 25px; fill: #fff; }
    .barra-reserva .txt { display: flex; flex-direction: column; line-height: 1.12; text-align: left; }
    .barra-reserva .txt small { font-size: .72rem; font-weight: 600; opacity: .9; letter-spacing: .2px; }
    .barra-reserva .txt b { font-size: 1.05rem; font-weight: 800; letter-spacing: .2px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .plato { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

  <!-- ============================ TOPBAR ============================ -->
  <div class="topbar">
    <a class="logo" href="index.html" aria-label="La Causa de Don Lucho">
      <img class="logo-ico" src="assets/logo.png" alt="" />
      <span class="word">La Causa de <b>Don Lucho</b></span>
    </a>
    <a class="btn-volver" href="index.html">← Inicio</a>
  </div>

  <!-- ============================ CABECERA ============================ -->
  <div class="carta-head">
    <!-- ESCUDO / LOGO real del restaurante -->
    <img class="crest" src="assets/logo.png" alt="La Causa de Don Lucho" />

    <h1>Nuestra <em>Carta</em></h1>
    <p>Cocina criolla · Barranco, Lima</p>
  </div>

  <!-- ============================ FILTROS DE CATEGORÍA ============================ -->
  <div class="filtros-wrap">
    <div class="filtros" id="filtros" role="tablist" aria-label="Categorías"></div>
  </div>
  <div class="conteo" id="conteo"></div>

  <!-- ============================ GRID 2 COLUMNAS ============================ -->
  <main class="contenedor">
    <div class="grid" id="grid" aria-label="Carta de platos"></div>
  </main>

  <!-- ============================ BARRA FIJA RESERVAR ============================ -->
  <div class="barra-reserva">
    <a href="https://wa.me/51998877665?text=Hola%20Don%20Lucho,%20vi%20la%20carta%20y%20quiero%20reservar" target="_blank" rel="noopener">
      <span class="ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 0 1 8.413 3.488 11.82 11.82 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.515 5.26l-.999 3.648 3.733-.979z"/></svg></span>
      <span class="txt"><small>Mesa para hoy · respuesta inmediata</small><b>Reservar por WhatsApp</b></span>
    </a>
  </div>

  <script>
    /* =========================================================
       CATEGORÍAS
       -------------------------------------------------------
       Cada plato pertenece a una categoría (cat). Edita o agrega
       categorías aquí; los chips de filtro se generan solos.
       ========================================================= */
    const CATEGORIAS = [
      { id: 'ceviches', label: 'Ceviches & Entradas', ico: '🐟' },
      { id: 'fondos',   label: 'Fondos Criollos',     ico: '🍲' },
      { id: 'parrilla', label: 'Parrilla',            ico: '🔥' },
      { id: 'tragos',   label: 'Tragos & Cócteles',   ico: '🍸' },
      { id: 'bebidas',  label: 'Bebidas',             ico: '🥤' },
    ];

    /* =========================================================
       PLATOS
       -------------------------------------------------------
       Para añadir tu video 4K de Higgsfield, coloca el archivo en
       /videos con el nombre indicado en "video". Mientras no exista,
       se muestra la escena 3D animada. Video: VERTICAL 9:16, mudo, loop.
       ========================================================= */
    const PLATOS = [
      { cat: 'ceviches', tag: 'Entrada · Estrella', nombre: 'Ceviche <em>Clásico</em>', emoji: '🐟',
        desc: 'Pescado fresco en leche de tigre, camote y choclo serrano.',
        precio: 'S/ 38', reco: true, tema: '#0e7c66', video: 'videos/ceviche.mp4' },

      { cat: 'ceviches', tag: 'Entrada · De la casa', nombre: 'Causa <em>Limeña</em>', emoji: '🍋',
        desc: 'Papa amarilla con ají y limón, rellena de pollo y palta.',
        precio: 'S/ 28', reco: false, tema: '#e0a92e', video: 'videos/causa.mp4' },

      { cat: 'fondos', tag: 'Fondo · Insignia', nombre: 'Lomo <em>Saltado</em>', emoji: '🥩',
        desc: 'Lomo fino al wok a fuego vivo con cebolla, tomate y sillao.',
        precio: 'S/ 42', reco: true, tema: '#b3471a', video: 'videos/lomo-saltado.mp4' },

      { cat: 'fondos', tag: 'Fondo · Criollo', nombre: 'Ají de <em>Gallina</em>', emoji: '🍗',
        desc: 'Gallina en cremosa salsa de ají amarillo, nueces y parmesano.',
        precio: 'S/ 34', reco: false, tema: '#d4a017', video: 'videos/aji-de-gallina.mp4' },

      { cat: 'fondos', tag: 'Fondo · Del mar', nombre: 'Arroz con <em>Mariscos</em>', emoji: '🦐',
        desc: 'Arroz cremoso al ají panca cargado de mariscos frescos.',
        precio: 'S/ 46', reco: true, tema: '#c2691f', video: 'videos/arroz-mariscos.mp4' },

      { cat: 'parrilla', tag: 'Parrilla · Tradición', nombre: 'Anticuchos de <em>Corazón</em>', emoji: '🍢',
        desc: 'Brochetas marinadas en ají panca, doradas a la parrilla.',
        precio: 'S/ 26', reco: false, tema: '#8b1a1a', video: 'videos/anticuchos.mp4' },

      { cat: 'tragos', tag: 'Cóctel · Bandera', nombre: 'Pisco <em>Sour</em>', emoji: '🍸',
        desc: 'Pisco quebranta, limón, jarabe y la espuma justa.',
        precio: 'S/ 22', reco: true, tema: '#c9b27a', video: 'videos/pisco-sour.mp4' },

      { cat: 'bebidas', tag: 'Bebida · Refrescante', nombre: 'Chicha <em>Morada</em>', emoji: '🟣',
        desc: 'Maíz morado con piña, canela y clavo. Jarra helada.',
        precio: 'S/ 10', reco: false, tema: '#5b2a86', video: 'videos/chicha-morada.mp4' },
    ];

    const WSP = '51998877665';
    const grid = document.getElementById('grid');

    /* ===== Construcción de tarjetas ===== */
    PLATOS.forEach((p) => {
      const nombrePlano = p.nombre.replace(/<[^>]+>/g, '');
      const art = document.createElement('article');
      art.className = 'plato';
      art.dataset.cat = p.cat;
      art.style.setProperty('--tema', p.tema);
      art.innerHTML = `
        <div class="media">
          <div class="escena" aria-hidden="true"></div>
          <video class="plato-video" autoplay muted loop playsinline preload="auto">
            <source src="${p.video}" type="video/mp4" />
          </video>
          <div class="scrim"></div>
          ${p.reco ? '<span class="badge">⭐ Recomendado</span>' : ''}
          <div class="titulo"><span class="cat">${p.tag}</span><h3>${p.nombre}</h3></div>
        </div>
        <div class="info">
          <p>${p.desc}</p>
          <div class="fila">
            <span class="precio">${p.precio}</span>
            <a class="pedir" target="_blank" rel="noopener"
               href="https://wa.me/${WSP}?text=${encodeURIComponent('Hola Don Lucho, quiero pedir: ' + nombrePlano)}">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 0 1 8.413 3.488 11.82 11.82 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.515 5.26l-.999 3.648 3.733-.979z"/></svg>
              Pedir
            </a>
          </div>
        </div>
      `;
      grid.appendChild(art);
    });

    const tarjetas = Array.from(document.querySelectorAll('.plato'));

    /* =========================================================
       CHIPS DE FILTRO (Todos + categorías con platos)
       ========================================================= */
    const filtros = document.getElementById('filtros');
    const conteo = document.getElementById('conteo');

    function cuenta(catId) { return catId === 'todos' ? PLATOS.length : PLATOS.filter(p => p.cat === catId).length; }

    const chips = [{ id: 'todos', label: 'Todos', ico: '✦' }]
      .concat(CATEGORIAS.filter(c => cuenta(c.id) > 0));

    chips.forEach((c, i) => {
      const b = document.createElement('button');
      b.className = 'chip' + (i === 0 ? ' activo' : '');
      b.dataset.cat = c.id; b.setAttribute('role', 'tab');
      b.innerHTML = `<span class="ico">${c.ico}</span> ${c.label} <span class="n">${cuenta(c.id)}</span>`;
      filtros.appendChild(b);
    });

    function filtrar(catId) {
      let visibles = 0;
      tarjetas.forEach((t) => {
        const ok = (catId === 'todos' || t.dataset.cat === catId);
        t.classList.toggle('oculto', !ok);
        if (ok) { visibles++; }
      });
      // re-anima la entrada de las visibles
      tarjetas.filter(t => !t.classList.contains('oculto')).forEach((t, k) => {
        t.classList.remove('visible');
        t.style.transitionDelay = (Math.min(k, 6) * 0.04) + 's';
        requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('visible')));
      });
      const lbl = chips.find(c => c.id === catId).label;
      conteo.textContent = `${visibles} ${visibles === 1 ? 'plato' : 'platos'} · ${lbl}`;
    }

    filtros.addEventListener('click', (e) => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      filtros.querySelectorAll('.chip').forEach(c => c.classList.remove('activo'));
      chip.classList.add('activo');
      filtrar(chip.dataset.cat);
    });

    /* =========================================================
       REPRODUCCIÓN AUTOMÁTICA "AL PASAR SOBRE" CADA PLATO
       ========================================================= */
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* Los videos se reproducen solos; pausamos los que salen de pantalla
       (ahorra batería/CPU) sin mostrar ningún ícono de preview. */
    if ('IntersectionObserver' in window) {
      const obsPlay = new IntersectionObserver((entradas) => {
        entradas.forEach((e) => {
          const v = e.target.querySelector('.plato-video');
          if (!v) return;
          if (e.isIntersecting) { v.play().catch(() => {}); } else { v.pause(); }
        });
      }, { threshold: 0.35 });
      tarjetas.forEach((c) => obsPlay.observe(c));
    }

    /* =========================================================
       ENTRADA INICIAL DE LAS TARJETAS
       ========================================================= */
    if (reduce || !('IntersectionObserver' in window)) {
      tarjetas.forEach((c) => c.classList.add('visible'));
    } else {
      const obsRev = new IntersectionObserver((entradas) => {
        entradas.forEach((e, i) => {
          if (e.isIntersecting) {
            e.target.style.transitionDelay = (Math.min(i, 1) * 0.06) + 's';
            e.target.classList.add('visible');
            obsRev.unobserve(e.target);
          }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -30px 0px' });
      tarjetas.forEach((c) => obsRev.observe(c));
    }

    // Conteo inicial
    conteo.textContent = `${PLATOS.length} platos · Todos`;
  </script>
</body>
</html>
